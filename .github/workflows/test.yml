name: Build and Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: mruby-process
    - uses: actions/checkout@v4
      with:
        repository: mruby/mruby
        path: mruby
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ruby
    - name: Install GNU Bison
      run: sudo apt-get update && sudo apt-get install -y bison
    - name: Build and test
      run: |
        cd mruby-process
        make MRUBY_DIR=${{ github.workspace }}/mruby
